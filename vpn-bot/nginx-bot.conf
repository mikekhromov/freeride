server {
    listen 8443 ssl;
    server_name bot.arengate.tech;

    ssl_certificate     /etc/letsencrypt/live/arengate.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arengate.tech/privkey.pem;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
}
