services:

  mtproxy:
    image: seriyps/mtproto-proxy:latest
    container_name: mtproxy
    restart: always
    ports:
      - "8443:443"
    volumes:
      - ./mtproxy/data:/data
      - ./mtproxy/logs:/var/log/mtproxy

  vpn-bot:
    build: ./vpn-bot
    container_name: vpn-bot
    restart: always
    volumes:
      - ./vpn-bot/data:/app/data
      - ./mtproxy/logs:/mtproxy/logs:ro
      - ./mtproxy/data:/mtproxy/data
    env_file:
      - .env.local
    depends_on:
      - mtproxy
