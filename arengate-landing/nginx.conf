server {
    listen 80;
    server_name arengate.tech www.arengate.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name arengate.tech www.arengate.tech;
    root /var/www/arengate;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/arengate.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arengate.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|mp4)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
}
